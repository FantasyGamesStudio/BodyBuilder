name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test-api:
    name: Tests API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bodybuilder
          POSTGRES_PASSWORD: bodybuilder
          POSTGRES_DB: bodybuilder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://bodybuilder:bodybuilder@localhost:5432/bodybuilder_test
      JWT_SECRET: ci-test-secret
      OPENAI_API_KEY: sk-dummy-not-used-in-tests

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Migrar base de datos de test
        working-directory: apps/api
        run: pnpm run db:migrate

      - name: Ejecutar tests
        working-directory: apps/api
        run: pnpm test

  build-web:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: apps/web
        env:
          VITE_API_URL: https://placeholder.railway.app
        run: pnpm run build
